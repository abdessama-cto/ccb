name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: build darwin binaries and publish
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-s -w -X github.com/abdessama-cto/ccb/cmd/ccbootstrap.Version=${{ steps.version.outputs.version }}" \
            -o ccb-darwin-arm64 .

      - name: Build darwin/amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-s -w -X github.com/abdessama-cto/ccb/cmd/ccbootstrap.Version=${{ steps.version.outputs.version }}" \
            -o ccb-darwin-amd64 .

      - name: Duplicate legacy asset names
        run: |
          cp ccb-darwin-arm64 ccbootstrap-darwin-arm64
          cp ccb-darwin-amd64 ccbootstrap-darwin-amd64

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ccb-darwin-arm64
            ccb-darwin-amd64
            ccbootstrap-darwin-arm64
            ccbootstrap-darwin-amd64
